name: train_diffusion_unet_image_aubo_ego_rgb_delta_pose

task:
  name: aubo_ego_rgb_delta_pose
  dataset_path: expert_demos/aubo_ego_rgb_delta_pose.zarr
  image_key: image
  action_key: action
  eef_pose_key: eef_pose
  shape_meta:
    obs:
      image:
        shape: [3, 96, 96]
        type: rgb
    action:
      shape: [6]

dataset:
  _target_: diffusion_policy.dataset.real_pusht_image_dataset.RealPushTImageDataset
  zarr_path: ${task.dataset_path}
  horizon: 16
  pad_before: 2
  pad_after: 7
  seed: 42
  val_ratio: 0.1
  max_train_episodes: null

policy:
  _target_: diffusion_policy.policy.diffusion_unet_image_policy.DiffusionUnetImagePolicy
  shape_meta: ${task.shape_meta}
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small
    clip_sample: true
    prediction_type: epsilon
  horizon: 16
  n_action_steps: 8
  n_obs_steps: 2
  num_inference_steps: 100
  obs_as_global_cond: true
  diffusion_step_embed_dim: 128
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true

dataloader:
  batch_size: 64
  num_workers: 4
  shuffle: true
  pin_memory: true
  persistent_workers: true

val_dataloader:
  batch_size: 64
  num_workers: 4
  shuffle: false
  pin_memory: true
  persistent_workers: true

training:
  device: cuda:0
  seed: 42
  debug: false
  resume: true
  lr: 0.0001
  num_epochs: 100
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 0
  checkpoint_every: 10
  val_every: 1
  sample_every: 0
  max_train_steps: null
  max_val_steps: null

logging:
  project: aubo_diffusion_policy
  name: aubo_ego_rgb_delta_pose
  mode: offline

checkpoint:
  save_ckpt: true
  topk:
    monitor_key: val_loss
    mode: min
    k: 5
    format_str: epoch={epoch:04d}-val_loss={val_loss:.4f}.ckpt

hydra:
  run:
    dir: data/outputs/${name}/${now:%Y.%m.%d}/${now:%H.%M.%S}
